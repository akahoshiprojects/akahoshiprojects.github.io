<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akahoshi Arts</title>

<style>
body {
  background: #0a0a0a;
  color: white;
  font-family: Arial;
  margin: 0;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 10px 10px;
}

.header h1 {
  font-size: 42px;
  margin: 0;
}

.header p {
  color: #aaa;
  font-style: italic;
}

/* IDIOMA */
.lang {
  position: absolute;
  top: 10px;
  right: 10px;
}

/* TABS */
.tabs {
  text-align: center;
  margin-top: 10px;
}

.tabs button {
  background: #1a1a1a;
  color: white;
  border: none;
  padding: 10px 18px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

/* GALERÍA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

.galeria img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.galeria img:hover {
  transform: scale(1.05);
}

/* MODAL (ZOOM) */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  padding: 20px;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  text-align: center;
}

.modal img {
  max-width: 90%;
  max-height: 60%;
  border-radius: 10px;
}

.modal .info {
  margin-top: 15px;
  color: #ccc;
}

/* BOOK */
.book {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

/* OCULTAR */
.tab {
  display: none;
}
</style>
</head>

<body>

<!-- IDIOMA -->
<div class="lang">
  <button onclick="cambiarIdioma('es')">ES</button>
  <button onclick="cambiarIdioma('en')">EN</button>
</div>

<!-- HEADER -->
<div class="header">
  <h1 id="titulo">Akahoshi Arts</h1>
  <p id="frase">Donde la imaginación toma forma en la oscuridad</p>
</div>

<!-- TABS -->
<div class="tabs">
  <button onclick="mostrar('paints')" id="tab_paints">Paints</button>
  <button onclick="mostrar('ia')" id="tab_ia">IA</button>
  <button onclick="mostrar('draws')" id="tab_draws">Draws</button>
  <button onclick="mostrar('book')" id="tab_book">Book</button>
</div>

<!-- PAINTS -->
<div id="paints" class="tab">
  <div class="galeria">

    <img src="paint1.jpg" onclick="abrirModal(this, 'Nombre: Obra 1<br>Serie: Serie A')">
    <img src="paint2.jpg" onclick="abrirModal(this, 'Nombre: Obra 2<br>Serie: Serie B')">

  </div>
</div>

<!-- IA -->
<div id="ia" class="tab">
  <div class="galeria">

    <img src="ia1.jpg" onclick="abrirModal(this, 'Tema: Fantasía oscura')">

  </div>
</div>

<!-- DRAWS -->
<div id="draws" class="tab">
  <div class="galeria">

    <img src="draw1.jpg" onclick="abrirModal(this, 'Nombre: Personaje X<br>Serie: Mundo Y')">

  </div>
</div>

<!-- BOOK -->
<div id="book" class="tab">
  <div class="book">
    <h2>Historia</h2>
    <p>
      Aquí puedes escribir tus historias, lore o ideas.
    </p>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
  <img id="modalImg">
  <div id="modalInfo" class="info"></div>
</div>

<script>
function mostrar(tab) {
  document.querySelectorAll('.tab').forEach(el => el.style.display = 'none');
  document.getElementById(tab).style.display = 'block';
}

mostrar('paints');

/* MODAL */
function abrirModal(img, info) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("modalImg").src = img.src;
  document.getElementById("modalInfo").innerHTML = info;
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

/* MULTILENGUAJE */
function cambiarIdioma(lang) {

  if (lang === "es") {
    document.getElementById("frase").innerText = "Donde la imaginación toma forma en la oscuridad";
    document.getElementById("tab_ia").innerText = "IA";
  }

  if (lang === "en") {
    document.getElementById("frase").innerText = "Where imagination takes form in the darkness";
    document.getElementById("tab_ia").innerText = "AI";
  }
}
</script>

</body>
</html>
