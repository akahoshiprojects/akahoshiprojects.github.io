<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- TIPOGRAFÍA NOVELA -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Playfair+Display&display=swap" rel="stylesheet">

<title>Akahoshi Arts</title>

<style>
body {
  margin: 0;
  color: white;
  font-family: 'Playfair Display', serif;
  overflow-x: hidden;
}
.logo-container {
  position: relative;
  display: inline-block;
}

.logo {
  max-width: 800px;
  width: 90%;
  margin-bottom: 10px;
  position: relative;
  z-index: 2;
}

/* FUEGO DETRÁS (ahora en el contenedor) */
.logo-container::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 140%;
  height: 140%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle,
    rgba(255, 0, 0, 0.4),
    rgba(150, 0, 50, 0.3),
    rgba(120, 0, 150, 0.2),
    transparent 70%);
  filter: blur(20px);
  z-index: 1;
  animation: fuego 3s infinite alternate;
}

/* ANIMACIÓN */
@keyframes fuego {
  0% {
    transform: translate(-50%, -52%) scale(1);
    filter: blur(15px);
    opacity: 0.7;
  }
  100% {
    transform: translate(-50%, -48%) scale(1.1);
    filter: blur(25px);
    opacity: 1;
  }
}

/* FONDO OSCURO VIOLETA */
.fondo {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -2;
  pointer-events: none;
  background:
    /* TELARAÑAS */
    repeating-linear-gradient(
      45deg,
      rgba(150, 0, 200, 0.08) 0px,
      rgba(150, 0, 200, 0.08) 1px,
      transparent 1px,
      transparent 40px
    ),
    repeating-linear-gradient(
      -45deg,
      rgba(150, 0, 200, 0.08) 0px,
      rgba(150, 0, 200, 0.08) 1px,
      transparent 1px,
      transparent 40px
    ),

    /* AURA VIOLETA */
    radial-gradient(circle at 20% 30%, rgba(120,0,150,0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120,0,150,0.2), transparent 40%),

    /* BASE OSCURA */
    #050505;
}

/* PARTÍCULAS ROJAS */
.particulas {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  overflow: hidden;
  pointer-events: none;
}

.particula {
  position: absolute;
  width: 3px;
  height: 3px;
  background: red;
  border-radius: 50%;
  animation: flotar 10s linear infinite;
}

@keyframes flotar {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 10px;
}

.header h1 {
  font-family: 'Cinzel', serif;
  font-size: 48px;
  letter-spacing: 2px;
}

.header p {
  color: #b88cff;
  font-style: italic;
}

/* BOTONES */
.tabs {
  text-align: center;
  position: relative;
  z-index: 10;
}

.tabs button {
  background: #140014;
  color: #d9aaff;
  border: 1px solid #5a0066;
  padding: 10px 18px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

/* GALERÍA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

.galeria img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

/* EFECTO GLOW */
.galeria img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(180, 100, 255, 0.6);
}

/* MODAL */
.modal {
  display: none; /* 🔥 SOLO ESTE */
  position: fixed;
  z-index: 9999;
  inset: 0;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.95);
  overflow: hidden; /* 🔥 CLAVE */
  touch-action: none; /* 🔥 evita gestos en celular */

  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.modal img {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  display: block;
  margin: auto;
  user-select: none;
  -webkit-user-drag: none;
  touch-action: none; /* 🔥 evita que se mueva */
}
.modal .info {
  margin-top: 15px;
  color: #ccc;
}

/* OCULTAR */
.tab {
  display: none;
}
</style>
</head>

<body>

<!-- FONDO -->
<div class="fondo"></div>

<!-- PARTÍCULAS -->
<div class="particulas" id="particulas"></div>

<!-- HEADER -->
<div class="header">
  <div class="logo-container">
  <img src="logo.png" class="logo">
  </div>
  <p>Donde la oscuridad susurra historias olvidadas</p>
</div>

<!-- TABS -->
<div class="tabs">
  <button onclick="mostrar('paints')">Paints</button>
  <button onclick="mostrar('ia')">IA</button>
  <button onclick="mostrar('draws')">Draws</button>
  <button onclick="mostrar('book')">Book</button>
</div>

<!-- PAINTS -->
<div id="paints" class="tab">
  <div class="galeria">

    <img src="Paint01.png"
    onclick="abrirModal(this, 'Nombre: Rukia Kuchiki <br>Serie: Bleach')">
    <img src="Paint02.png"
    onclick="abrirModal(this, 'Nombre: Kurosaki Ichigo <br>Serie: Bleach')">
    <img src="Paint03.png"
    onclick="abrirModal(this, 'Nombre: Akane Minagawa <br>Serie: Scums Wish')">
    <img src="Paint04.png"
    onclick="abrirModal(this, 'Nombre: Bulma <br>Serie: Dragon Ball')">
    <img src="Paint05.webp"
    onclick="abrirModal(this, 'Nombre: Clark Kent~Joker <br>Serie: DC Comics')">
    <img src="Paint06.png"
    onclick="abrirModal(this, 'Nombre: Toga Himiko <br>Serie: My Hero Academia')">
    <img src="Paint07.png"
    onclick="abrirModal(this, 'Nombre: Momonga <br>Serie: Overlord')">
    <img src="Paint08.png"
    onclick="abrirModal(this, 'Nombre: Ai Hoshino <br>Serie: Oshi no Ko')">
    <img src="Paint09.png"
    onclick="abrirModal(this, 'Nombre: Hinata Shoyo <br>Serie: Haikyu')">
    <img src="Paint10.png"
    onclick="abrirModal(this, 'Nombre: Maomao & Shinji <br>Serie: The Apothecary Diaries')">
    <img src="Paint11.png"
    onclick="abrirModal(this, 'Nombre: Xie Lian <br>Serie: Tian Guan Ci Fu')">
    <img src="Paint12.png"
    onclick="abrirModal(this, 'Nombre: Leona Kingscholar <br>Serie: Twisted Wonderland')">
    <img src="Paint13.png"
    onclick="abrirModal(this, 'Nombre: Ikuyo Kita <br>Serie: Bocchi the Rock')">
    <img src="Paint14.png"
    onclick="abrirModal(this, 'Nombre: Rukia Kuchiki <br>Serie: Bleach')">
    <img src="Paint15.png"
    onclick="abrirModal(this, 'Nombre: Rukia Kuchiki <br>Serie: Bleach')">
    <img src="Paint16.png"
    onclick="abrirModal(this, 'Nombre: Rukia Kuchiki <br>Serie: Bleach')">
    <img src="Paint17.png"
    onclick="abrirModal(this, 'Nombre: Rukia Kuchiki <br>Serie: Bleach')">
    <img src="Paint18.png"
    onclick="abrirModal(this, 'Nombre: Rukia Kuchiki <br>Serie: Bleach')">
    <img src="Paint19.png"
    onclick="abrirModal(this, 'Nombre: Rukia Kuchiki <br>Serie: Bleach')">
    
  </div>
</div>

<!-- IA -->
<div id="ia" class="tab">
  <div class="galeria">

    <img src="IA1.jpg"
    onclick="abrirModal(this, 'Tema: Gyaru')">

  </div>
</div>

<!-- DRAWS -->
<div id="draws" class="tab">
  <div class="galeria">

    <img src="Draw1.jpg"
    onclick="abrirModal(this, 'Nombre: Boceto 1<br>Serie: Mundo base')">

  </div>
</div>

<!-- BOOK -->
<div id="book" class="tab">
  <div style="padding:20px; max-width:700px; margin:auto;">
    <h2>Historia</h2>
    <p>Aquí puedes escribir tus relatos, historias o ideas.</p>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
  <img id="modalImg">
  <div id="modalInfo" class="info"></div>
</div>

<script>
// CAMBIO DE TABS
function mostrar(tab) {
  document.querySelectorAll('.tab').forEach(el => el.style.display = 'none');
  document.getElementById(tab).style.display = 'block';
}
mostrar('paints');

// MODAL
function abrirModal(img, info) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalImg").src = img.src;
  document.getElementById("modalInfo").innerHTML = info;

  document.getElementById("particulas").style.display = "none";

  document.body.style.overflow = "hidden"; 
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("particulas").style.display = "block";

  document.body.style.overflow = "auto"; 
  }
// PARTÍCULAS
const contenedor = document.getElementById("particulas");

for (let i = 0; i < 50; i++) {
  let p = document.createElement("div");
  p.className = "particula";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 10) + "s";
  contenedor.appendChild(p);
}
</script>

</body>
</html>
