<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- TIPOGRAFÍA NOVELA -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Playfair+Display&display=swap" rel="stylesheet">

<title>Akahoshi Arts</title>

<style>
body {
  margin: 0;
  color: white;
  font-family: 'Playfair Display', serif;
  overflow-x: hidden;
}

/* FONDO OSCURO VIOLETA */
.fondo {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -2;
  background:
    radial-gradient(circle at 20% 30%, rgba(120,0,150,0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120,0,150,0.2), transparent 40%),
    #050505;
}

/* PARTÍCULAS ROJAS */
.particulas {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  overflow: hidden;
}

.particula {
  position: absolute;
  width: 3px;
  height: 3px;
  background: red;
  border-radius: 50%;
  animation: flotar 10s linear infinite;
}

@keyframes flotar {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 10px;
}

.header h1 {
  font-family: 'Cinzel', serif;
  font-size: 48px;
  letter-spacing: 2px;
}

.header p {
  color: #b88cff;
  font-style: italic;
}

/* BOTONES */
.tabs {
  text-align: center;
}

.tabs button {
  background: #140014;
  color: #d9aaff;
  border: 1px solid #5a0066;
  padding: 10px 18px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

/* GALERÍA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

.galeria img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

/* EFECTO GLOW */
.galeria img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(180, 100, 255, 0.6);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  text-align: center;
}

.modal img {
  max-width: 90%;
  margin-top: 50px;
}

.modal .info {
  margin-top: 15px;
  color: #ccc;
}

/* OCULTAR */
.tab {
  display: none;
}
</style>
</head>

<body>

<!-- FONDO -->
<div class="fondo"></div>

<!-- PARTÍCULAS -->
<div class="particulas" id="particulas"></div>

<!-- HEADER -->
<div class="header">
  <h1>Akahoshi Arts</h1>
  <p>Donde la oscuridad susurra historias olvidadas</p>
</div>

<!-- TABS -->
<div class="tabs">
  <button onclick="mostrar('paints')">Paints</button>
  <button onclick="mostrar('ia')">IA</button>
  <button onclick="mostrar('draws')">Draws</button>
  <button onclick="mostrar('book')">Book</button>
</div>

<!-- PAINTS -->
<div id="paints" class="tab">
  <div class="galeria">

    <img src="paint/Paint1.png"
    onclick="abrirModal(this, 'Nombre: Mi primer paint<br>Serie: Akahoshi')">

  </div>
</div>

<!-- IA -->
<div id="ia" class="tab">
  <div class="galeria">

    <img src="IA/IA1.jpg"
    onclick="abrirModal(this, 'Tema: Creación con IA')">

  </div>
</div>

<!-- DRAWS -->
<div id="draws" class="tab">
  <div class="galeria">

    <img src="draw/Draw1.jpg"
    onclick="abrirModal(this, 'Nombre: Boceto 1<br>Serie: Mundo base')">

  </div>
</div>

<!-- BOOK -->
<div id="book" class="tab">
  <div style="padding:20px; max-width:700px; margin:auto;">
    <h2>Historia</h2>
    <p>Aquí puedes escribir tus relatos, historias o ideas.</p>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
  <img id="modalImg">
  <div id="modalInfo" class="info"></div>
</div>

<script>
// CAMBIO DE TABS
function mostrar(tab) {
  document.querySelectorAll('.tab').forEach(el => el.style.display = 'none');
  document.getElementById(tab).style.display = 'block';
}
mostrar('paints');

// MODAL
function abrirModal(img, info) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("modalImg").src = img.src;
  document.getElementById("modalInfo").innerHTML = info;

  document.getElementById("particulas").style.display = "none";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("particulas").style.display = "block";
}

// PARTÍCULAS
const contenedor = document.getElementById("particulas");

for (let i = 0; i < 50; i++) {
  let p = document.createElement("div");
  p.className = "particula";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 10) + "s";
  contenedor.appendChild(p);
}
</script>

</body>
</html>
